# ===========================================================================
# Controller configuration for RoboClaw differential-drive robot
# ===========================================================================
# Robot specs:
#   Wheel diameter: 400 mm (radius 0.2 m)
#   Gear ratio: 16:1
#   Max speed target: ~16 km/h = 4.44 m/s
#   Encoder: 1000 CPR
#
# At max speed: 4.44 m/s / 0.2 m = 22.2 rad/s wheel angular velocity
# ===========================================================================

controller_manager:
  ros__parameters:
    update_rate: 100  # Hz

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    diagnostics_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    diff_drive_controller:
      type: diff_drive_controller/DiffDriveController

joint_state_broadcaster:
  ros__parameters:
    joints:
      - left_wheel_joint
      - right_wheel_joint
    interfaces:
      - position
      - velocity

diagnostics_broadcaster:
  ros__parameters:
    joints:
      - diagnostics
    interfaces:
      - main_battery_v
      - temperature_c
      - error_status
      - current_left_a
      - current_right_a
      - encoder_health

diff_drive_controller:
  ros__parameters:
    left_wheel_names: ["left_wheel_joint"]
    right_wheel_names: ["right_wheel_joint"]

    wheel_separation: 0.4
    wheels_per_side: 1
    wheel_radius: 0.2

    wheel_separation_multiplier: 1.0
    left_wheel_radius_multiplier: 1.0
    right_wheel_radius_multiplier: 1.0

    # Velocity limits for ~16 km/h operation.
    # Acceleration limits DISABLED: RC tank mode requires instant per-wheel
    # response. The diff_drive_controller's independent linear/angular ramp
    # breaks per-wheel independence during transitions (linear reaches target
    # in 0.4s while angular takes 1.9s → both wheels move during ramp).
    # Nav2 can add its own velocity smoother when autonomous mode is needed.
    linear:
      x:
        has_velocity_limits: true
        has_acceleration_limits: false
        has_jerk_limits: false
        max_velocity: 4.5          # m/s (~16.2 km/h)
        min_velocity: -4.5

    angular:
      z:
        has_velocity_limits: true
        has_acceleration_limits: false
        has_jerk_limits: false
        # Must accommodate tank mode per-wheel independence:
        # max = 2 * max_wheel_speed / wheel_separation = 2 * 4.5 / 0.4 = 22.5
        max_velocity: 22.5         # rad/s
        min_velocity: -22.5

    publish_rate: 50.0
    odom_frame_id: odom
    base_frame_id: base_link
    pose_covariance_diagonal:  [0.001, 0.001, 0.001, 0.001, 0.001, 0.01]
    twist_covariance_diagonal: [0.001, 0.001, 0.001, 0.001, 0.001, 0.01]

    # Set true while encoders are not mounted on motor shafts.
    # Floating encoders generate noise that the closed-loop controller
    # interprets as motion, causing unwanted motor commands.
    # Switch back to false once encoders are properly mounted.
    open_loop: true
    enable_odom_tf: true

    # Safety: stop motors if no cmd_vel arrives within 500 ms.
    # This replaces the old safety_bridge watchdog entirely.
    cmd_vel_timeout: 0.5

# ===========================================================================
# RC Teleop — RC-to-cmd_vel translator with mode switch
# ===========================================================================
# Params are currently set in roboclaw.launch.py.
# Uncomment and add to launch config to override from YAML:
#
# rc_teleop:
#   ros__parameters:
#     mixing_mode: "tank"          # "tank" = per-wheel sticks, "arcade" = throttle+steering
#     max_wheel_speed: 4.5         # m/s — max speed per wheel at full stick
#     wheel_separation: 0.4        # m — must match diff_drive_controller
#     left_topic: "/robot/motor_left"
#     right_topic: "/robot/motor_right"
#     throttle_topic: "/robot/motor_left"
#     steering_topic: "/robot/motor_right"
#     mode_switch_topic: "/robot/rc_mode"
#     mode_switch_threshold: 0.5
#     cmd_vel_topic: "/diff_drive_controller/cmd_vel"
#     estop_topic: "/robot/estop"
#     max_linear_speed: 4.5        # only used in arcade mode
#     max_angular_speed: 3.0       # only used in arcade mode
#     deadzone: 0.05
#     publish_rate: 20.0
