# ===========================================================================
# Controller configuration for RoboClaw differential-drive robot
# ===========================================================================
# Robot specs:
#   Wheel diameter: 400 mm (radius 0.2 m)
#   Gear ratio: 16:1
#   Max speed target: ~16 km/h = 4.44 m/s
#   Encoder: 1000 CPR
#
# At max speed: 4.44 m/s / 0.2 m = 22.2 rad/s wheel angular velocity
# ===========================================================================

controller_manager:
  ros__parameters:
    update_rate: 100  # Hz

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    diagnostics_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    diff_drive_controller:
      type: diff_drive_controller/DiffDriveController

joint_state_broadcaster:
  ros__parameters:
    joints:
      - left_wheel_joint
      - right_wheel_joint
    interfaces:
      - position
      - velocity

diagnostics_broadcaster:
  ros__parameters:
    joints:
      - diagnostics
    interfaces:
      - main_battery_v
      - temperature_c
      - error_status
      - current_left_a
      - current_right_a

diff_drive_controller:
  ros__parameters:
    left_wheel_names: ["left_wheel_joint"]
    right_wheel_names: ["right_wheel_joint"]

    wheel_separation: 0.4
    wheels_per_side: 1
    wheel_radius: 0.2

    wheel_separation_multiplier: 1.0
    left_wheel_radius_multiplier: 1.0
    right_wheel_radius_multiplier: 1.0

    # Velocity and acceleration limits for ~16 km/h operation
    linear:
      x:
        has_velocity_limits: true
        has_acceleration_limits: true
        has_jerk_limits: false
        max_velocity: 4.5          # m/s (~16.2 km/h)
        min_velocity: -4.5
        max_acceleration: 2.0      # m/s^2
        min_acceleration: -2.0

    angular:
      z:
        has_velocity_limits: true
        has_acceleration_limits: true
        has_jerk_limits: false
        max_velocity: 3.0          # rad/s
        min_velocity: -3.0
        max_acceleration: 3.0      # rad/s^2
        min_acceleration: -3.0

    publish_rate: 50.0
    odom_frame_id: odom
    base_frame_id: base_link
    pose_covariance_diagonal:  [0.001, 0.001, 0.001, 0.001, 0.001, 0.01]
    twist_covariance_diagonal: [0.001, 0.001, 0.001, 0.001, 0.001, 0.01]

    # Set true while encoders are not mounted on motor shafts.
    # Floating encoders generate noise that the closed-loop controller
    # interprets as motion, causing unwanted motor commands.
    # Switch back to false once encoders are properly mounted.
    open_loop: true
    enable_odom_tf: true

    # Safety: stop motors if no cmd_vel arrives within 500 ms.
    # This replaces the old safety_bridge watchdog entirely.
    cmd_vel_timeout: 0.5
